<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BSC World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #34374C;
  --navy-deep: #2C2E3E;
  --navy-light: #3d4058;
  --red: #EE2B47;
  --red-light: #f4556a;
  --red-dim: rgba(238, 43, 71, 0.1);
  --teal: #00668f;
  --white: #ffffff;
  --off-white: #F6F6F6;
  --gray: #e0e0e0;
  --gray-mid: #666666;
  --gray-dark: #2C2E3E;
  --qualified-bg: #fde8ec;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 10px;
  /* Legacy aliases for JS inline styles that reference old names */
  --green-dark: var(--navy);
  --gray-light: var(--off-white);
  --gold: var(--red);
  --gold-light: var(--red-light);
  --gold-dim: var(--red-dim);
}

html { font-size: 16px; }
body {
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--off-white);
  color: var(--gray-dark);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
.header {
  background:
    repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 12px
    ),
    linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 100%);
  color: var(--white);
  padding: 20px 16px 14px;
  text-align: center;
  position: relative;
  border-bottom: 3px solid var(--red);
}
.header-logo {
  display: block;
  margin: 0 auto -30px;
  height: 180px;
  width: auto;
}
.club-name {
  font-family: 'Oswald', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.header h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header .subtitle {
  font-size: 0.75rem;
  color: #ffffff;
  margin-top: 2px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.week-badge {
  display: inline-block;
  background: var(--red);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 20px;
  margin-top: 10px;
  letter-spacing: 0.5px;
}

/* ===== TAB NAV ===== */
.tab-nav {
  display: flex;
  background: var(--navy);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: none;
}
.tab-nav button {
  flex: 1;
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 10px 4px 8px;
  cursor: pointer;
  transition: color 0.2s, border-bottom 0.2s;
  border-bottom: 3px solid transparent;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tab-nav button.active {
  color: var(--white);
  border-bottom-color: var(--red);
}
.tab-nav button:hover { color: var(--white); }

/* ===== TAB CONTENT ===== */
.tab-content { display: none; padding: 12px; max-width: 720px; margin: 0 auto; }
.tab-content.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ===== STAGGERED CARD REVEAL ===== */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.card-reveal {
  opacity: 0;
  animation: slideUp 0.4s ease forwards;
}
.card-reveal:nth-child(1) { animation-delay: 0.05s; }
.card-reveal:nth-child(2) { animation-delay: 0.1s; }
.card-reveal:nth-child(3) { animation-delay: 0.15s; }
.card-reveal:nth-child(4) { animation-delay: 0.2s; }
.card-reveal:nth-child(5) { animation-delay: 0.25s; }
.card-reveal:nth-child(6) { animation-delay: 0.3s; }
.card-reveal:nth-child(7) { animation-delay: 0.35s; }
.card-reveal:nth-child(8) { animation-delay: 0.4s; }

/* ===== PULSE ANIMATION ===== */
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

/* ===== CARDS ===== */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  padding: 16px;
  margin-bottom: 12px;
  border-left: 3px solid var(--red);
}
.card-title {
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.card-title .flag { font-size: 1rem; margin-right: 4px; }

/* ===== ANNOUNCEMENT CARDS ===== */
.announcement {
  border-left: 3px solid var(--teal);
}
.announcement .date {
  font-size: 0.7rem;
  color: var(--gray-mid);
  margin-bottom: 4px;
}
.announcement p { font-size: 0.85rem; line-height: 1.5; }

/* ===== COUNTDOWN ===== */
.countdown-card {
  background: var(--navy-deep);
  color: var(--white);
  text-align: center;
  border-left: 3px solid var(--red);
}
.countdown-card .label {
  font-family: 'Oswald', sans-serif;
  font-size: 0.7rem;
  color: var(--red);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
}
.countdown-card .value {
  font-family: 'Oswald', sans-serif;
  font-size: 4rem;
  font-weight: 900;
  margin: 6px 0;
  animation: pulse 2s ease-in-out infinite;
}
.countdown-card .sub {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.8rem;
  opacity: 0.7;
}

/* ===== GROUP CARDS ===== */
.group-card { overflow: hidden; }
.group-header {
  font-family: 'Oswald', sans-serif;
  background: var(--navy);
  color: var(--white);
  margin: -16px -16px 12px -16px;
  padding: 10px 16px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-left: -19px;
  padding-left: 19px;
}
.group-team {
  display: flex;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--gray);
  font-size: 0.82rem;
}
.group-team:nth-child(even) { background: rgba(0,0,0,0.02); }
.group-team:last-child { border-bottom: none; }
.group-team .flag { font-size: 1.2rem; margin-right: 8px; flex-shrink: 0; }
.group-team .country { font-weight: 600; margin-right: 6px; }
.group-team .bsc-name { color: var(--gray-mid); font-size: 0.75rem; margin-left: auto; text-align: right; }
.group-challenge-divider {
  font-family: 'Oswald', sans-serif;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray-mid);
  padding: 8px 0 4px;
  border-top: 1px dashed var(--gray);
  margin-top: 2px;
}
.group-team-challenge { opacity: 0.7; }
.group-team-challenge .challenge-badge { margin-left: auto; }

/* ===== STANDINGS TABLE ===== */
.standings-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.standings-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.72rem;
  min-width: 420px;
  font-family: 'Montserrat', sans-serif;
}
.standings-table th {
  font-family: 'Oswald', sans-serif;
  background: var(--navy);
  color: var(--white);
  padding: 8px 4px;
  text-align: center;
  font-weight: 600;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: sticky;
  top: 0;
  white-space: nowrap;
}
.standings-table th:first-child, .standings-table th:nth-child(2) { text-align: left; }
.standings-table td {
  padding: 7px 4px;
  text-align: center;
  border-bottom: 1px solid var(--gray);
  white-space: nowrap;
}
.standings-table tbody tr:nth-child(even) { background: var(--off-white); }
.standings-table tbody tr:nth-child(odd) { background: var(--white); }
.standings-table td:first-child { text-align: center; font-weight: 600; width: 28px; }
.standings-table td:nth-child(2) { text-align: left; }
.standings-table tr.qualified { background: var(--red-dim) !important; }
.standings-table .team-cell { display: flex; align-items: center; gap: 4px; }
.standings-table .team-cell .flag { font-size: 1rem; }
.standings-table .pts { font-weight: 700; color: var(--red); }

/* Small group standings */
.group-standings { margin-top: 10px; }
.group-standings .standings-table { min-width: 100%; }
.group-standings .standings-table th, .group-standings .standings-table td { padding: 5px 3px; font-size: 0.68rem; }

/* Fixed-width group standings columns */
.standings-table.group-table { table-layout: fixed; min-width: 0; }
.standings-table.group-table col.col-country { width: 36%; }
.standings-table.group-table col.col-bsc { width: 24%; }
.standings-table.group-table col.col-stat { width: 8%; }
.standings-table.group-table td:first-child, .standings-table.group-table th:first-child { text-align: left; width: auto; font-weight: 400; }
.standings-table.group-table td:nth-child(2), .standings-table.group-table th:nth-child(2) { text-align: left; }
.standings-table.group-table .team-cell { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Scoring title table columns */
.standings-table.scoring-table { table-layout: fixed; min-width: 0; }
.standings-table.scoring-table col.col-rank { width: 8%; }
.standings-table.scoring-table col.col-country { width: 42%; }
.standings-table.scoring-table col.col-bsc { width: 36%; }
.standings-table.scoring-table col.col-goals { width: 14%; }
.standings-table.scoring-table td:first-child { width: auto; }
.standings-table.scoring-table td:nth-child(2), .standings-table.scoring-table th:nth-child(2) { text-align: left; }
.standings-table.scoring-table td:nth-child(3), .standings-table.scoring-table th:nth-child(3) { text-align: left; }

/* ===== SCHEDULE ===== */
.week-section { margin-bottom: 16px; }
.week-header {
  font-family: 'Oswald', sans-serif;
  background: var(--navy);
  color: var(--white);
  padding: 10px 14px;
  border-radius: var(--radius) var(--radius) 0 0;
  font-size: 0.82rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.week-header.current { background: var(--red); border-left: none; }
.week-header .week-date { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: rgba(255,255,255,0.8); font-weight: 500; text-transform: none; letter-spacing: 0; }
.match-list {
  background: var(--white);
  border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
.match-row {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--gray);
  font-size: 0.8rem;
  transition: background 0.15s ease;
}
.match-row:hover { background: rgba(0,0,0,0.015); }
.match-row:last-child { border-bottom: none; }
.match-team {
  display: flex;
  align-items: center;
  gap: 6px;
}
.match-team.home { width: 38%; flex-shrink: 0; }
.match-team.away { flex: 1; }
.match-team .flag { font-size: 1.2rem; }
.match-team .name { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.78rem; }
.match-vs {
  padding: 0 10px;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.75rem;
  color: var(--gray-mid);
  font-weight: 500;
  flex-shrink: 0;
}
.match-score {
  font-family: 'Oswald', sans-serif;
  background: var(--navy);
  color: var(--white);
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 1.1rem;
  flex-shrink: 0;
  min-width: 50px;
  text-align: center;
}
.match-label {
  font-size: 0.65rem;
  color: var(--gray-mid);
  margin-top: 2px;
  text-align: center;
  width: 100%;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.match-row-wrap { border-bottom: 1px solid var(--gray); }
.match-row-wrap:last-child { border-bottom: none; }
.match-row-wrap .match-row { border-bottom: none; }
/* Inline group label */
.match-row-wrap.inline-label { display: flex; align-items: center; }
.match-row-wrap.inline-label .match-row { flex: 1; }
.match-row-wrap.inline-label .match-label { width: auto; margin-top: 0; flex-shrink: 0; font-weight: 600; margin-left: 4px; padding-right: 10px; }
.match-team .bsc-label { font-size: 0.65rem; color: var(--gray-mid); font-weight: 400; margin-left: 2px; }
.challenge-badge {
  display: inline-block;
  background: rgba(0, 102, 143, 0.1);
  color: var(--teal);
  font-size: 0.6rem;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 4px;
}

/* ===== BRACKET ===== */
.bracket-container { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 16px; }
.bracket {
  display: flex;
  gap: 12px;
  min-width: 700px;
  align-items: stretch;
  padding: 8px 0;
}
.bracket-round {
  display: flex;
  flex-direction: column;
  gap: 0;
  min-width: 150px;
}
.bracket-matches {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
}
.bracket-round-title {
  font-family: 'Oswald', sans-serif;
  text-align: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--red);
  margin-bottom: 4px;
}
.bracket-match {
  background: var(--navy-deep);
  border-radius: 6px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
  margin: 4px 0;
}
.bracket-team {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 8px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--white);
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.bracket-team:last-child { border-bottom: none; }
.bracket-team.winner { border-left: 3px solid var(--red); font-weight: 700; }
.bracket-team.tbd { color: rgba(255,255,255,0.7); font-style: italic; border: 1px dashed rgba(255,255,255,0.3); border-radius: 6px; }
.bracket-team .flag { font-size: 0.9rem; }
.bracket-team .score { margin-left: auto; font-weight: 700; font-size: 0.72rem; color: var(--red-light); }
.bracket-spacer { height: 20px; }

/* Third place match */
.third-place { margin-top: 20px; }
.third-place .card-title { color: var(--teal); }

/* Consolation section */
.consolation-section { margin-top: 24px; }
.consolation-section .card-title { margin-bottom: 12px; }

/* ===== FILTER PILLS ===== */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.filter-pill {
  background: var(--white);
  border: 1.5px solid var(--gray);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--gray-dark);
}
.filter-pill.active {
  background: var(--navy);
  color: var(--white);
  border-color: var(--navy);
}

/* ===== GLANCE GRID ===== */
.glance-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.glance-item {
  text-align: center;
  padding: 12px 8px;
  background: var(--off-white);
  border-radius: 8px;
}
.glance-item .glance-num {
  font-family: 'Oswald', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--red);
  line-height: 1;
}
.glance-item .glance-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--gray-mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

/* ===== FOOTER ===== */
.footer {
  background: var(--navy-deep);
  text-align: center;
  padding: 24px 16px;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.65rem;
  color: rgba(255,255,255,0.5);
}

/* ===== RESPONSIVE ===== */
@media (min-width: 600px) {
  .tab-content { padding: 20px; }
  .tab-nav button { font-size: 0.8rem; padding: 12px 8px 10px; }
  .header h1 { font-size: 2.4rem; }
  .header-logo { height: 225px; }
  .club-name { font-size: 1.8rem; }
  .groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .groups-grid .card { margin-bottom: 0; }
  .bracket { flex-direction: row; }
}

/* ===== UTILITY ===== */
.text-center { text-align: center; }
.text-gold { color: var(--red); }
a { color: var(--teal); }
.mb-8 { margin-bottom: 8px; }
.mt-12 { margin-top: 12px; }
</style>
</head>

<!-- Header -->
<header class="header">
  <img src="https://cdn2.sportngin.com/attachments/photo/bd06-216817597/BSC_TT_-_NBG_large.png" alt="Brookline Soccer Club" class="header-logo">
  <div class="club-name">Brookline Soccer Club</div>
  <h1>World Cup 2026</h1>
  <div class="subtitle">April 20 &ndash; June 1</div>
  <div class="week-badge" id="weekBadge">Week 1 - Group Stage</div>
</header>

<!-- Tab Navigation -->
<nav class="tab-nav">
  <button class="active" onclick="switchTab('home')">Home</button>
  <button onclick="switchTab('groups')">Groups</button>
  <button onclick="switchTab('teams')">Teams</button>
  <button onclick="switchTab('standings')">Standings</button>
  <button onclick="switchTab('schedule')">Schedule</button>
  <button onclick="switchTab('bracket')">Bracket</button>
</nav>

<!-- Home Tab -->
<div id="tab-home" class="tab-content active"></div>

<!-- Groups Tab -->
<div id="tab-groups" class="tab-content"></div>

<!-- Teams Tab -->
<div id="tab-teams" class="tab-content"></div>

<!-- Standings Tab -->
<div id="tab-standings" class="tab-content"></div>

<!-- Schedule Tab -->
<div id="tab-schedule" class="tab-content"></div>

<!-- Bracket Tab -->
<div id="tab-bracket" class="tab-content"></div>

<!-- Footer -->
<div class="footer">BSC World Cup 2026 &middot; Brookline Soccer Club</div>

<script>
// =============================================================================
// ===== WEEKLY UPDATE SECTION =================================================
// =============================================================================
// Update currentWeek each Monday (1-7). Update RESULTS and BRACKET as season
// progresses. Update ANNOUNCEMENTS with current news.
// =============================================================================

const CURRENT_WEEK = 1; // 1=Apr 20, 2=Apr 27, 3=May 4, 4=May 11, 5=May 18, 6=May 25, 7=Jun 1

const WEEK_DATES = {
  1: "April 20",
  2: "April 27",
  3: "May 4",
  4: "May 11",
  5: "May 18",
  6: "May 25",

};

const WEEK_LABELS = {

  3: "Group Stage - Matchday 3",
  4: "Round of 16",
  5: "Quarterfinals",

  7: "Final & Third Place"
};

// ===== ANNOUNCEMENTS =====
// Add/remove announcements each week. Most recent first.
const ANNOUNCEMENTS = [
  {
    date: "April 14, 2026",
    text: "Welcome to the BSC World Cup 2026! Opening ceremonies and Matchday 1 kick off on April 20. Check the Groups and Schedule tabs to see your team's draw. Good luck to all 33 teams!"
  },
  {
    date: "April 10, 2026",
    text: "The group draw is complete! 33 BSC teams have been assigned to 12 groups. Check out which World Cup country your team represents."
  }
];

// ===== TEAMS =====
// id, bscName, country, flag (emoji), group, grade, gender
const TEAMS = [
  // Group A (3 BSC teams + 1 challenge)
  { id: 1,  bscName: "B4 Valencia",    country: "Mexico",          flag: "🇲🇽", group: "A", grade: "4th", gender: "Boys" },
  { id: 2,  bscName: "G7 Ajax",        country: "Korea Republic",  flag: "🇰🇷", group: "A", grade: "7th", gender: "Girls" },
  { id: 3,  bscName: "B6 Roma",        country: "South Africa",    flag: "🇿🇦", group: "A", grade: "6th", gender: "Boys" },

  // Group B (3 BSC teams + 1 challenge)

// ===== HELPER FUNCTIONS =====
function getTeam(id) {
  return TEAMS.find(t => t.id === id);
}

function getChallengeOpponent(ref) {
  const parts = ref.split(":");
  const group = parts[1];
  const idx = parseInt(parts[2]);
  return (CHALLENGE_COUNTRIES[group] && CHALLENGE_COUNTRIES[group][idx]) || { country: "TBD", flag: "\u2753" };
}

function getMatchResult(week, matchIndex) {
  const key = week + "-" + matchIndex;
  return RESULTS[key] || null;
}

// ===== CHALLENGE SCORE COMPUTATION =====
// Returns the rounded average of all 33 BSC teams' goals scored that week.
// Used as the challenge team's score in challenge matches.
function computeChallengeScore(week) {
  const matches = SCHEDULE[week] || [];
  let totalGoals = 0;
  let teamCount = 0;

  matches.forEach((match, idx) => {
    const result = getMatchResult(week, idx);
    if (!result) return;

    // Home team is always a BSC team — count their goals
    totalGoals += result.homeScore;
    teamCount++;

    // Away team: if it's a real team (not challenge), count their goals too
    if (match.type === "group") {
      totalGoals += result.awayScore;
      teamCount++;
    }
  });

  if (teamCount === 0) return 0;
  return Math.round(totalGoals / teamCount);
}

// ===== STANDINGS CALCULATION =====
// Challenge matches now COUNT toward standings. The challenge team's score
// is the rounded average of all 33 BSC teams' goals that week.
function calcStandings(teamIds, weekFilter) {
  const stats = {};
  teamIds.forEach(id => {
    stats[id] = { mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
  });

  const weeks = weekFilter || [1, 2, 3];
  weeks.forEach(week => {
    const challengeScore = computeChallengeScore(week);
    const matches = SCHEDULE[week] || [];
    matches.forEach((match, idx) => {
      const result = getMatchResult(week, idx);
      if (!result) return;

      const isChallenge = match.type === "challenge";
      const hId = match.home;

      if (!stats[hId]) return;

      if (isChallenge) {
        // Challenge match: BSC team (home) vs challenge team (away)
        // BSC team's score = result.homeScore (what they actually scored)
        // Challenge team's score = challengeScore (computed average)
        const bscGoals = result.homeScore;
        const challengeGoals = challengeScore;

        stats[hId].mp++;
        stats[hId].gf += bscGoals;
        stats[hId].ga += challengeGoals;

        if (bscGoals > challengeGoals) {
          stats[hId].w++; stats[hId].pts += 3;
        } else if (bscGoals < challengeGoals) {
          stats[hId].l++;
        } else {
          stats[hId].d++; stats[hId].pts += 1;
        }
      } else {
        // Group match: two real BSC teams
        const aId = match.away;
        if (!stats[aId]) return;

        stats[hId].mp++;
        stats[aId].mp++;
        stats[hId].gf += result.homeScore;
        stats[hId].ga += result.awayScore;
        stats[aId].gf += result.awayScore;
        stats[aId].ga += result.homeScore;

        if (result.homeScore > result.awayScore) {
          stats[hId].w++; stats[hId].pts += 3;
          stats[aId].l++;
        } else if (result.homeScore < result.awayScore) {
          stats[aId].w++; stats[aId].pts += 3;
          stats[hId].l++;
        } else {
          stats[hId].d++; stats[hId].pts += 1;
          stats[aId].d++; stats[aId].pts += 1;
        }
      }
    });
  });

  // Calculate GD
  teamIds.forEach(id => {
    stats[id].gd = stats[id].gf - stats[id].ga;
  });

  // Sort: pts desc, gf desc (goals scored), ga asc (goals allowed)
  const sorted = [...teamIds].sort((a, b) => {
    if (stats[b].pts !== stats[a].pts) return stats[b].pts - stats[a].pts;
    if (stats[b].gf !== stats[a].gf) return stats[b].gf - stats[a].gf;
    if (stats[a].ga !== stats[b].ga) return stats[a].ga - stats[b].ga;
    return 0;
  });

  return sorted.map(id => ({ teamId: id, ...stats[id] }));
}

function calcOverallStandings() {
  const allIds = TEAMS.map(t => t.id);
  return calcStandings(allIds);
}

// ===== ADVANCEMENT =====
// 11 group winners + 5 best remaining = 16 teams for R16.
// If challenge team tops a group, the runner-up (next BSC team) advances instead.
function calcAdvancement() {
  const groupLetters = Object.keys(GROUPS);
  const winners = [];
  const remaining = [];

  groupLetters.forEach(letter => {
    const teamIds = GROUPS[letter];
    const standings = calcStandings(teamIds);
    if (standings.length > 0 && standings[0].mp > 0) {
      winners.push(standings[0].teamId);
      remaining.push(...standings.slice(1).map(s => s.teamId));
    }
  });

  // Sort remaining by pts desc, gf desc, ga asc
  const remainingStandings = calcStandings(remaining);
  const wildCards = remainingStandings.slice(0, 5).map(s => s.teamId);

  return { winners, wildCards, r16: [...winners, ...wildCards] };
}

// ===== SCORING TITLE CALCULATION =====
// Sums goals from SCORING_TITLE for weeks 4-7.
function calcScoringTitle() {
  const totals = {};
  TEAMS.forEach(t => { totals[t.id] = 0; });

  [4, 5, 6, 7].forEach(week => {
    const weekData = SCORING_TITLE[week];
    if (!weekData) return;
    Object.keys(weekData).forEach(id => {
      const teamId = parseInt(id);
      if (totals[teamId] !== undefined) {
        totals[teamId] += weekData[teamId];
      }
    });
  });

  const sorted = TEAMS.map(t => t.id).sort((a, b) => totals[b] - totals[a]);
  return sorted.map(id => ({ teamId: id, goals: totals[id] }));
}

  document.getElementById('tab-' + tabName).classList.add('active');

    if (btn.textContent.toLowerCase().replace(/\s/g, '') === tabName.replace(/\s/g, '')) btn.classList.add('active');

  if (tabName === 'groups') renderGroups();

}

function renderStandings() {
  const el = document.getElementById('tab-standings');
  let html = '';

  // Check if any group-stage results exist
  var anyResults = false;
  var allGroupLetters = ['A','B','C','D','E','F','H','I','J','K','L'];
  allGroupLetters.forEach(letter => {
    const standings = calcStandings(GROUPS[letter]);
    if (standings.some(s => s.mp > 0)) anyResults = true;
  });

  // ===== GROUP STANDINGS =====
  html += '<div class="card card-reveal">';
  html += '<div class="card-title">Group Standings</div>';

  allGroupLetters.forEach(letter => {
    const teamIds = GROUPS[letter];
    const standings = calcStandings(teamIds);
    const challengeTeams = getGroupChallengeCountries(letter);
    // Compute challenge team stats for display
    var challengeRow = { w: 0, l: 0, d: 0, pts: 0, gf: 0, mp: 0 };
    if (challengeTeams.length > 0) {
      [1,2,3].forEach(week => {
        var challengeScore = computeChallengeScore(week);
        var matches = SCHEDULE[week] || [];
        matches.forEach((match, idx) => {
          if (match.type !== 'challenge' || match.group !== letter) return;
          var result = getMatchResult(week, idx);
          if (!result) return;
          challengeRow.mp++;
          var bscGoals = result.homeScore;
          challengeRow.gf += challengeScore;
          if (challengeScore > bscGoals) { challengeRow.w++; challengeRow.pts += 3; }
          else if (challengeScore < bscGoals) { challengeRow.l++; }
          else { challengeRow.d++; challengeRow.pts += 1; }
        });
      });
    }

    html += '<div class="group-header" style="margin-top:16px;">Group ' + letter + '</div>';
    html += '<div class="standings-table-wrap">';
    html += '<table class="standings-table group-table">';
    html += '<colgroup><col class="col-country"><col class="col-bsc"><col class="col-stat"><col class="col-stat"><col class="col-stat"><col class="col-stat"><col class="col-stat"></colgroup>';
    html += '<thead><tr><th>Country</th><th>BSC Team</th><th>W</th><th>L</th><th>D</th><th>Pts</th><th>GS</th></tr></thead>';
    html += '<tbody>';
    standings.forEach(s => {
      const t = getTeam(s.teamId);
      html += '<tr>';
      html += '<td><div class="team-cell"><span class="flag">' + t.flag + '</span> ' + t.country + '</div></td>';
      html += '<td>' + t.bscName + '</td>';
      html += '<td>' + s.w + '</td><td>' + s.l + '</td><td>' + s.d + '</td>';
      html += '<td class="pts">' + s.pts + '</td>';
      html += '<td>' + s.gf + '</td>';
      html += '</tr>';
    });
    // Challenge team row
    if (challengeTeams.length > 0) {
      var c = challengeTeams[0];
      html += '<tr style="opacity:0.6;font-style:italic;">';
      html += '<td><div class="team-cell"><span class="flag">' + c.flag + '</span> ' + c.country + '</div></td>';
      html += '<td><span class="challenge-badge">Challenge</span></td>';
      html += '<td>' + challengeRow.w + '</td><td>' + challengeRow.l + '</td><td>' + challengeRow.d + '</td>';
      html += '<td class="pts">' + challengeRow.pts + '</td>';
      html += '<td>' + challengeRow.gf + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  });

  html += '</div>';

  // ===== SCORING TITLE =====
  html += '<div class="card card-reveal">';
  html += '<div class="card-title">Scoring Title</div>';
  html += '<p style="font-size:0.78rem;color:var(--gray-mid);margin-bottom:12px;">Only goals scored in Weeks 4\u20137 count toward the Scoring Title.</p>';

  var scoringData = calcScoringTitle();

  html += '<div class="standings-table-wrap">';
  html += '<table class="standings-table scoring-table">';
  html += '<colgroup><col class="col-rank"><col class="col-country"><col class="col-bsc"><col class="col-goals"></colgroup>';
  html += '<thead><tr><th>#</th><th>Country</th><th>BSC Team</th><th>Goals</th></tr></thead>';
  html += '<tbody>';
  scoringData.forEach((s, i) => {
    const t = getTeam(s.teamId);
    var medal = '';
    if (s.goals > 0 && i === 0) medal = ' style="background:rgba(255,215,0,0.15);"';
    else if (s.goals > 0 && i === 1) medal = ' style="background:rgba(192,192,192,0.15);"';
    else if (s.goals > 0 && i === 2) medal = ' style="background:rgba(205,127,50,0.15);"';
    html += '<tr' + medal + '>';
    html += '<td>' + (i + 1) + '</td>';
    html += '<td><div class="team-cell"><span class="flag">' + t.flag + '</span> ' + t.country + '</div></td>';
    html += '<td>' + t.bscName + '</td>';
    html += '<td class="pts">' + s.goals + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  html += '</div>';

  el.innerHTML = html;
}

function renderSchedule() {
  const el = document.getElementById('tab-schedule');
  let html = '';

  for (let week = 1; week <= 7; week++) {
    const matches = SCHEDULE[week] || [];
    const isCurrent = week === CURRENT_WEEK;
    const weekLabel = WEEK_LABELS[week] || 'Week ' + week;

    html += '<div class="week-section">';
    html += '<div class="week-header ' + (isCurrent ? 'current' : '') + '">';
    html += '<span>Week ' + week + ' \u2014 ' + weekLabel + '</span>';
    html += '<span class="week-date">' + (WEEK_DATES[week] || '') + '</span>';
    html += '</div>';

    if (matches.length === 0) {
      html += '<div class="match-list"><div class="match-row" style="justify-content:center;color:var(--gray-mid);font-size:0.8rem;padding:16px;">Matchups TBD</div></div>';
    } else {
      // Sort group-stage matches by group letter; keep knockout matches in original order
      var sortedIdxs = matches.map((m, i) => i);
      if (week <= 3) {
        sortedIdxs.sort((a, b) => {
          var ga = matches[a].group || 'ZZ';
          var gb = matches[b].group || 'ZZ';
          return ga.localeCompare(gb);
        });
      }

      html += '<div class="match-list">';
      sortedIdxs.forEach(idx => {
        var match = matches[idx];
        const result = getMatchResult(week, idx);
        const homeTeam = getTeam(match.home);
        let awayTeam, awayFlag, awayName, awayBsc = '', isChallenge = false;

        if (typeof match.away === 'string' && match.away.startsWith('challenge:')) {
          const opp = getChallengeOpponent(match.away);
          awayFlag = opp.flag;
          awayName = opp.country;
          isChallenge = true;
        } else {
          awayTeam = getTeam(match.away);
          awayFlag = awayTeam ? awayTeam.flag : '';
          awayName = awayTeam ? awayTeam.country : 'TBD';
          awayBsc = awayTeam ? awayTeam.bscName : '';
        }

        var hasGroupLabel = match.group && week <= 3;
        html += '<div class="match-row-wrap' + (hasGroupLabel ? ' inline-label' : '') + '">';
        html += '<div class="match-row">';
        html += '<div class="match-team home">';
        html += '<span class="flag">' + (homeTeam ? homeTeam.flag : '') + '</span>';
        html += '<span class="name">' + (homeTeam ? homeTeam.country : 'TBD') + '</span>';
        if (homeTeam) html += '<span class="bsc-label">' + homeTeam.bscName + '</span>';
        html += '</div>';

        if (result) {
          var displayAway = isChallenge ? computeChallengeScore(week) : result.awayScore;
          html += '<div class="match-score">' + result.homeScore + ' \u2013 ' + displayAway + '</div>';
        } else {
          html += '<div class="match-vs">vs</div>';
        }

        html += '<div class="match-team away">';
        html += '<span class="flag">' + awayFlag + '</span>';
        html += '<span class="name">' + awayName + '</span>';
        if (isChallenge) html += '<span class="challenge-badge">Challenge</span>';
        else if (awayBsc) html += '<span class="bsc-label">' + awayBsc + '</span>';
        html += '</div>';
        html += '</div>';

        // Group label — inline for group stage, separate line for knockout
        if (hasGroupLabel) {
          html += '<div class="match-label">Group ' + match.group + '</div>';
        } else if (match.label) {
          html += '<div class="match-label">' + match.label + '</div>';
        }

        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  }

  el.innerHTML = html;
}

function renderBracketRound(title, matches) {
  let html = '<div class="bracket-round">';
  html += '<div class="bracket-round-title">' + title + '</div>';
  html += '<div class="bracket-matches">';

  matches.forEach((m, i) => {
    html += renderBracketMatchCard(m);
  });

  html += '</div></div>';
  return html;
}

function renderBracketMatchCard(m) {
  let html = '<div class="bracket-match">';

  const homeTeam = m.home.teamId ? getTeam(m.home.teamId) : null;
  const awayTeam = m.away.teamId ? getTeam(m.away.teamId) : null;

  const homeWinner = m.home.score !== null && m.away.score !== null && m.home.score > m.away.score;
  const awayWinner = m.home.score !== null && m.away.score !== null && m.away.score > m.home.score;

  html += '<div class="bracket-team ' + (homeWinner ? 'winner' : '') + (homeTeam ? '' : ' tbd') + '">';
  html += '<span class="flag">' + (homeTeam ? homeTeam.flag : '') + '</span> ';
  html += (homeTeam ? homeTeam.country : (m.label ? m.label.split(' vs ')[0] || 'TBD' : 'TBD'));
  if (m.home.score !== null) html += '<span class="score">' + m.home.score + '</span>';
  html += '</div>';

  html += '<div class="bracket-team ' + (awayWinner ? 'winner' : '') + (awayTeam ? '' : ' tbd') + '">';
  html += '<span class="flag">' + (awayTeam ? awayTeam.flag : '') + '</span> ';
  html += (awayTeam ? awayTeam.country : (m.label ? m.label.split(' vs ')[1] || 'TBD' : 'TBD'));
  if (m.away.score !== null) html += '<span class="score">' + m.away.score + '</span>';
  html += '</div>';

  html += '</div>';
  return html;
}
