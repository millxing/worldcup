<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BSC Mock World Cup 2026</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-dark: #1a472a;
  --green-mid: #245a38;
  --green-light: #2d6e45;
  --gold: #d4af37;
  --gold-light: #e8c94a;
  --gold-dim: rgba(212, 175, 55, 0.15);
  --white: #ffffff;
  --gray-light: #f4f4f4;
  --gray: #e0e0e0;
  --gray-mid: #999;
  --gray-dark: #333;
  --qualified-bg: rgba(212, 175, 55, 0.1);
  --card-shadow: 0 2px 8px rgba(0,0,0,0.12);
  --radius: 10px;
}

html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--gray-light);
  color: var(--gray-dark);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
  color: var(--white);
  padding: 16px 16px 12px;
  text-align: center;
  position: relative;
}
.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.header .subtitle {
  font-size: 0.75rem;
  color: var(--gold);
  margin-top: 2px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.week-badge {
  display: inline-block;
  background: var(--gold);
  color: var(--green-dark);
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 12px;
  margin-top: 8px;
  letter-spacing: 0.5px;
}

/* ===== TAB NAV ===== */
.tab-nav {
  display: flex;
  background: var(--green-dark);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 2px solid var(--gold);
}
.tab-nav button {
  flex: 1;
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  font-size: 0.72rem;
  font-weight: 600;
  padding: 10px 4px 8px;
  cursor: pointer;
  transition: color 0.2s, border-bottom 0.2s;
  border-bottom: 3px solid transparent;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tab-nav button.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.tab-nav button:hover { color: var(--white); }

/* ===== TAB CONTENT ===== */
.tab-content { display: none; padding: 12px; max-width: 720px; margin: 0 auto; }
.tab-content.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ===== CARDS ===== */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--green-dark);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.card-title .flag { font-size: 1rem; margin-right: 4px; }

/* ===== ANNOUNCEMENT CARDS ===== */
.announcement {
  border-left: 4px solid var(--gold);
}
.announcement .date {
  font-size: 0.7rem;
  color: var(--gray-mid);
  margin-bottom: 4px;
}
.announcement p { font-size: 0.85rem; line-height: 1.5; }

/* ===== COUNTDOWN ===== */
.countdown-card {
  background: linear-gradient(135deg, var(--green-dark), var(--green-light));
  color: var(--white);
  text-align: center;
}
.countdown-card .label { font-size: 0.8rem; color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.countdown-card .value { font-size: 2rem; font-weight: 800; margin: 6px 0; }
.countdown-card .sub { font-size: 0.75rem; opacity: 0.8; }

/* ===== GROUP CARDS ===== */
.group-card { overflow: hidden; }
.group-header {
  background: var(--green-dark);
  color: var(--white);
  margin: -16px -16px 12px;
  padding: 10px 16px;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 1px;
}
.group-team {
  display: flex;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--gray);
  font-size: 0.82rem;
}
.group-team:last-child { border-bottom: none; }
.group-team .flag { font-size: 1.2rem; margin-right: 8px; flex-shrink: 0; }
.group-team .country { font-weight: 600; margin-right: 6px; }
.group-team .bsc-name { color: var(--gray-mid); font-size: 0.75rem; }

/* ===== STANDINGS TABLE ===== */
.standings-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.standings-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.72rem;
  min-width: 420px;
}
.standings-table th {
  background: var(--green-dark);
  color: var(--gold);
  padding: 8px 4px;
  text-align: center;
  font-weight: 600;
  position: sticky;
  top: 0;
  white-space: nowrap;
}
.standings-table th:first-child, .standings-table th:nth-child(2) { text-align: left; }
.standings-table td {
  padding: 7px 4px;
  text-align: center;
  border-bottom: 1px solid var(--gray);
  white-space: nowrap;
}
.standings-table td:first-child { text-align: center; font-weight: 600; width: 28px; }
.standings-table td:nth-child(2) { text-align: left; }
.standings-table tr.qualified { background: var(--qualified-bg); }
.standings-table .team-cell { display: flex; align-items: center; gap: 4px; }
.standings-table .team-cell .flag { font-size: 1rem; }
.standings-table .pts { font-weight: 700; color: var(--green-dark); }

/* Small group standings */
.group-standings { margin-top: 10px; }
.group-standings .standings-table { min-width: 100%; }
.group-standings .standings-table th, .group-standings .standings-table td { padding: 5px 3px; font-size: 0.68rem; }

/* ===== SCHEDULE ===== */
.week-section { margin-bottom: 16px; }
.week-header {
  background: var(--green-dark);
  color: var(--white);
  padding: 10px 14px;
  border-radius: var(--radius) var(--radius) 0 0;
  font-size: 0.82rem;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.week-header.current { background: linear-gradient(135deg, var(--green-dark), var(--green-light)); border-left: 4px solid var(--gold); }
.week-header .week-date { font-size: 0.7rem; color: var(--gold); font-weight: 500; }
.match-list {
  background: var(--white);
  border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
.match-row {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--gray);
  font-size: 0.8rem;
}
.match-row:last-child { border-bottom: none; }
.match-team {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}
.match-team.away { justify-content: flex-end; text-align: right; flex-direction: row-reverse; }
.match-team .flag { font-size: 1.1rem; }
.match-team .name { font-weight: 600; font-size: 0.78rem; }
.match-vs {
  padding: 0 8px;
  font-size: 0.7rem;
  color: var(--gray-mid);
  font-weight: 600;
  flex-shrink: 0;
}
.match-score {
  background: var(--green-dark);
  color: var(--white);
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 0.8rem;
  flex-shrink: 0;
  min-width: 50px;
  text-align: center;
}
.match-label {
  font-size: 0.65rem;
  color: var(--gray-mid);
  margin-top: 2px;
  text-align: center;
  width: 100%;
}
.match-row-wrap { border-bottom: 1px solid var(--gray); }
.match-row-wrap:last-child { border-bottom: none; }
.match-row-wrap .match-row { border-bottom: none; }
.challenge-badge {
  display: inline-block;
  background: var(--gold-dim);
  color: #b8960a;
  font-size: 0.6rem;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 4px;
}

/* ===== BRACKET ===== */
.bracket-container { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 16px; }
.bracket {
  display: flex;
  gap: 12px;
  min-width: 700px;
  align-items: flex-start;
  padding: 8px 0;
}
.bracket-round {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 150px;
}
.bracket-round-title {
  text-align: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--green-dark);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--gold);
  margin-bottom: 4px;
}
.bracket-match {
  background: var(--white);
  border-radius: 6px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
  border: 1px solid var(--gray);
}
.bracket-team {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 8px;
  font-size: 0.7rem;
  font-weight: 500;
  border-bottom: 1px solid var(--gray);
}
.bracket-team:last-child { border-bottom: none; }
.bracket-team.winner { background: var(--gold-dim); font-weight: 700; }
.bracket-team.tbd { color: var(--gray-mid); font-style: italic; }
.bracket-team .flag { font-size: 0.9rem; }
.bracket-team .score { margin-left: auto; font-weight: 700; font-size: 0.72rem; color: var(--green-dark); }
.bracket-spacer { height: 20px; }

/* Third place match */
.third-place { margin-top: 20px; }
.third-place .card-title { color: var(--gold); }

/* Consolation section */
.consolation-section { margin-top: 24px; }
.consolation-section .card-title { margin-bottom: 12px; }

/* ===== FILTER PILLS ===== */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.filter-pill {
  background: var(--white);
  border: 1.5px solid var(--gray);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--gray-dark);
}
.filter-pill.active {
  background: var(--green-dark);
  color: var(--gold);
  border-color: var(--green-dark);
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 24px 16px;
  font-size: 0.7rem;
  color: var(--gray-mid);
}

/* ===== RESPONSIVE ===== */
@media (min-width: 600px) {
  .tab-content { padding: 20px; }
  .tab-nav button { font-size: 0.8rem; padding: 12px 8px 10px; }
  .header h1 { font-size: 1.5rem; }
  .groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .groups-grid .card { margin-bottom: 0; }
}

/* ===== UTILITY ===== */
.text-center { text-align: center; }
.text-gold { color: var(--gold); }
.mb-8 { margin-bottom: 8px; }
.mt-12 { margin-top: 12px; }
</style>
</head>

// ===== HELPER FUNCTIONS =====
function getTeam(id) {
  return TEAMS.find(t => t.id === id);
}

function getChallengeOpponent(ref) {
  const idx = parseInt(ref.split(":")[1]);
  return CHALLENGE_COUNTRIES[idx] || { country: "TBD", flag: "\u2753" };
}

function getMatchResult(week, matchIndex) {
  const key = week + "-" + matchIndex;
  return RESULTS[key] || null;
}

// ===== STANDINGS CALCULATION =====
function calcStandings(teamIds, weekFilter) {
  const stats = {};
  teamIds.forEach(id => {
    stats[id] = { mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
  });

  // Iterate through group-stage weeks (1-3)
  const weeks = weekFilter || [1, 2, 3];
  weeks.forEach(week => {
    const matches = SCHEDULE[week] || [];
    matches.forEach((match, idx) => {
      if (match.type !== "group") return;
      const result = getMatchResult(week, idx);
      if (!result) return;
      const hId = match.home;
      const aId = match.away;
      if (!stats[hId] || !stats[aId]) return;

      stats[hId].mp++;
      stats[aId].mp++;
      stats[hId].gf += result.homeScore;
      stats[hId].ga += result.awayScore;
      stats[aId].gf += result.awayScore;
      stats[aId].ga += result.homeScore;

      if (result.homeScore > result.awayScore) {
        stats[hId].w++; stats[hId].pts += 3;
        stats[aId].l++;
      } else if (result.homeScore < result.awayScore) {
        stats[aId].w++; stats[aId].pts += 3;
        stats[hId].l++;
      } else {
        stats[hId].d++; stats[hId].pts += 1;
        stats[aId].d++; stats[aId].pts += 1;
      }
    });
  });

  // Calculate GD
  teamIds.forEach(id => {
    stats[id].gd = stats[id].gf - stats[id].ga;
  });

  // Sort: pts desc, gd desc, gf desc
  const sorted = [...teamIds].sort((a, b) => {
    if (stats[b].pts !== stats[a].pts) return stats[b].pts - stats[a].pts;
    if (stats[b].gd !== stats[a].gd) return stats[b].gd - stats[a].gd;
    if (stats[b].gf !== stats[a].gf) return stats[b].gf - stats[a].gf;
    return 0;
  });

  return sorted.map(id => ({ teamId: id, ...stats[id] }));
}

function calcOverallStandings() {
  const allIds = TEAMS.map(t => t.id);
  return calcStandings(allIds);
}

// ===== TAB SWITCHING =====
function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab-' + tabName).classList.add('active');
  document.querySelectorAll('.tab-nav button').forEach(btn => {
    if (btn.textContent.toLowerCase().replace(/\s/g, '') === tabName.replace(/\s/g, '')) btn.classList.add('active');
  });
  // Re-render dynamic content
  if (tabName === 'groups') renderGroups();
  if (tabName === 'standings') renderStandings();
  if (tabName === 'schedule') renderSchedule();
  if (tabName === 'bracket') renderBracket();
  if (tabName === 'home') renderHome();
}

// ===== RENDER: SCHEDULE =====
function renderSchedule() {
  const el = document.getElementById('tab-schedule');
  let html = '';

  for (let week = 1; week <= 7; week++) {
    const matches = SCHEDULE[week] || [];
    const isCurrent = week === CURRENT_WEEK;
    const weekLabel = WEEK_LABELS[week] || 'Week ' + week;

    html += '<div class="week-section">';
    html += '<div class="week-header ' + (isCurrent ? 'current' : '') + '">';
    html += '<span>Week ' + week + ' \u2014 ' + weekLabel + '</span>';
    html += '<span class="week-date">' + (WEEK_DATES[week] || '') + '</span>';
    html += '</div>';

    if (matches.length === 0) {
      html += '<div class="match-list"><div class="match-row" style="justify-content:center;color:var(--gray-mid);font-size:0.8rem;padding:16px;">Matchups TBD</div></div>';
    } else {
      html += '<div class="match-list">';
      matches.forEach((match, idx) => {
        const result = getMatchResult(week, idx);
        const homeTeam = getTeam(match.home);
        let awayTeam, awayFlag, awayName, isChallenge = false;

        if (typeof match.away === 'string' && match.away.startsWith('challenge:')) {
          const opp = getChallengeOpponent(match.away);
          awayFlag = opp.flag;
          awayName = opp.country;
          isChallenge = true;
        } else {
          awayTeam = getTeam(match.away);
          awayFlag = awayTeam ? awayTeam.flag : '';
          awayName = awayTeam ? awayTeam.country : 'TBD';
        }

        html += '<div class="match-row-wrap">';
        html += '<div class="match-row">';
        html += '<div class="match-team home">';
        html += '<span class="flag">' + (homeTeam ? homeTeam.flag : '') + '</span>';
        html += '<span class="name">' + (homeTeam ? homeTeam.country : 'TBD') + '</span>';
        html += '</div>';

        if (result) {
          html += '<div class="match-score">' + result.homeScore + ' \u2013 ' + result.awayScore + '</div>';
        } else {
          html += '<div class="match-vs">vs</div>';
        }

        html += '<div class="match-team away">';
        html += '<span class="flag">' + awayFlag + '</span>';
        html += '<span class="name">' + awayName + '</span>';
        if (isChallenge) html += '<span class="challenge-badge">Challenge</span>';
        html += '</div>';
        html += '</div>';

        // Match label
        if (match.group) {
          html += '<div class="match-label">Group ' + match.group + (match.type === 'challenge' ? ' \u2014 Challenge Match' : '') + '</div>';
        } else if (match.label) {
          html += '<div class="match-label">' + match.label + '</div>';
        }

        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  }

  el.innerHTML = html;
}

  html += '<div class="bracket-round-title">' + title + '</div>';

  matches.forEach((m, i) => {
    html += renderBracketMatchCard(m);
    // Add spacers for alignment in earlier rounds
    if (title === 'Round of 16' && i < matches.length - 1 && i % 2 === 1) {
      // no spacer needed between pairs
    }
  });

  html += '</div>';
  return html;
}

function renderBracketMatchCard(m) {
  let html = '<div class="bracket-match">';

  const homeTeam = m.home.teamId ? getTeam(m.home.teamId) : null;
  const awayTeam = m.away.teamId ? getTeam(m.away.teamId) : null;

  const homeWinner = m.home.score !== null && m.away.score !== null && m.home.score > m.away.score;
  const awayWinner = m.home.score !== null && m.away.score !== null && m.away.score > m.home.score;

  html += '<div class="bracket-team ' + (homeWinner ? 'winner' : '') + (homeTeam ? '' : ' tbd') + '">';
  html += '<span class="flag">' + (homeTeam ? homeTeam.flag : '') + '</span> ';
  html += (homeTeam ? homeTeam.country : (m.label ? m.label.split(' vs ')[0] || 'TBD' : 'TBD'));
  if (m.home.score !== null) html += '<span class="score">' + m.home.score + '</span>';
  html += '</div>';

  html += '<div class="bracket-team ' + (awayWinner ? 'winner' : '') + (awayTeam ? '' : ' tbd') + '">';
  html += '<span class="flag">' + (awayTeam ? awayTeam.flag : '') + '</span> ';
  html += (awayTeam ? awayTeam.country : (m.label ? m.label.split(' vs ')[1] || 'TBD' : 'TBD'));
  if (m.away.score !== null) html += '<span class="score">' + m.away.score + '</span>';
  html += '</div>';

  html += '</div>';
  return html;
}

// ===== WEEK BADGE =====
function updateWeekBadge() {
  const badge = document.getElementById('weekBadge');
  if (CURRENT_WEEK <= 3) {
    badge.textContent = 'Week ' + CURRENT_WEEK + ' \u2014 Group Stage';
  } else if (CURRENT_WEEK === 4) {
    badge.textContent = 'Week 4 \u2014 Round of 16';
  } else if (CURRENT_WEEK === 5) {
    badge.textContent = 'Week 5 \u2014 Quarterfinals';
  } else if (CURRENT_WEEK === 6) {
    badge.textContent = 'Week 6 \u2014 Semifinals';
  } else {
    badge.textContent = 'Week 7 \u2014 Finals';
  }
}

// ===== INIT =====
function init() {
  updateWeekBadge();
  renderHome();
}

init();
</script>
