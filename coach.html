<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BSC World Cup 2026 — Coach View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #34374C;
  --navy-deep: #2C2E3E;
  --navy-light: #3d4058;
  --red: #EE2B47;
  --red-light: #f4556a;
  --red-dim: rgba(238, 43, 71, 0.1);
  --teal: #00668f;
  --white: #ffffff;
  --off-white: #F6F6F6;
  --gray: #e0e0e0;
  --gray-mid: #666666;
  --gray-dark: #2C2E3E;
  --qualified-bg: #fde8ec;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 10px;
  /* Legacy aliases for JS inline styles that reference old names */
  --green-dark: var(--navy);
  --gray-light: var(--off-white);
  --gold: var(--red);
  --gold-light: var(--red-light);
  --gold-dim: var(--red-dim);
}

html { font-size: 16px; }
body {
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--off-white);
  color: var(--gray-dark);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
.header {
  background:
    repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 12px
    ),
    linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 100%);
  color: var(--white);
  padding: 20px 16px 14px;
  text-align: center;
  position: relative;
  border-bottom: 3px solid var(--red);
}
.header-logo {
  display: block;
  margin: 0 auto -30px;
  height: 180px;
  width: auto;
}
.club-name {
  font-family: 'Oswald', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.header h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header .subtitle {
  font-size: 0.75rem;
  color: #ffffff;
  margin-top: 2px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.week-badge {
  display: inline-block;
  background: var(--red);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 20px;
  margin-top: 10px;
  letter-spacing: 0.5px;
}

/* ===== COACH BANNER ===== */
.coach-banner {
  background: linear-gradient(135deg, #c41e38, var(--red));
  color: var(--white);
  text-align: center;
  padding: 10px 16px;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* ===== TAB NAV ===== */
.tab-nav {
  display: flex;
  background: var(--navy);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: none;
}
.tab-nav button {
  flex: 1;
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.68rem;
  font-weight: 600;
  padding: 10px 2px 8px;
  cursor: pointer;
  transition: color 0.2s, border-bottom 0.2s, background 0.2s;
  border-bottom: 3px solid transparent;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.tab-nav button.active {
  color: var(--white);
  border-bottom-color: var(--red);
}
.tab-nav button:hover { color: var(--white); }
.tab-nav button[data-tab="coach"].active {
  color: var(--white);
  background: var(--red);
  border-bottom-color: var(--red);
}

/* ===== TAB CONTENT ===== */
.tab-content { display: none; padding: 12px; max-width: 720px; margin: 0 auto; }
.tab-content.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ===== PULSE ANIMATION ===== */
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

/* ===== SLIDE UP ANIMATION ===== */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== CARDS ===== */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  padding: 16px;
  margin-bottom: 12px;
  border-left: 3px solid var(--red);
  animation: slideUp 0.4s ease both;
}
.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }
.card:nth-child(4) { animation-delay: 0.15s; }
.card:nth-child(5) { animation-delay: 0.2s; }
.card-title {
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.card-title .flag { font-size: 1rem; margin-right: 4px; }

/* ===== ANNOUNCEMENT CARDS ===== */
.announcement {
  border-left: 3px solid var(--teal);
}
.announcement .date {
  font-size: 0.7rem;
  color: var(--gray-mid);
  margin-bottom: 4px;
}
.announcement p { font-size: 0.85rem; line-height: 1.5; }

/* ===== COUNTDOWN ===== */
.countdown-card {
  background: var(--navy-deep);
  color: var(--white);
  text-align: center;
  border-left: 3px solid var(--red);
}
.countdown-card .label {
  font-family: 'Oswald', sans-serif;
  font-size: 0.7rem;
  color: var(--red);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
}
.countdown-card .value {
  font-family: 'Oswald', sans-serif;
  font-size: 4rem;
  font-weight: 900;
  margin: 6px 0;
  animation: pulse 2s ease-in-out infinite;
}
.countdown-card .sub {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.8rem;
  opacity: 0.7;
}

/* ===== GROUP CARDS ===== */
.group-card { overflow: hidden; }
.group-header {
  font-family: 'Oswald', sans-serif;
  background: var(--navy);
  color: var(--white);
  margin: -16px -16px 12px -16px;
  padding: 10px 16px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-left: -19px;
  padding-left: 19px;
}
.group-team {
  display: flex;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--gray);
  font-size: 0.82rem;
}
.group-team:nth-child(even) { background: rgba(0,0,0,0.02); }
.group-team:last-child { border-bottom: none; }
.group-team .flag { font-size: 1.2rem; margin-right: 8px; flex-shrink: 0; }
.group-team .country { font-weight: 600; margin-right: 6px; }
.group-team .bsc-name { color: var(--gray-mid); font-size: 0.75rem; margin-left: auto; text-align: right; }
.group-challenge-divider {
  font-family: 'Oswald', sans-serif;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray-mid);
  padding: 8px 0 4px;
  border-top: 1px dashed var(--gray);
  margin-top: 2px;
}
.group-team-challenge { opacity: 0.7; }
.group-team-challenge .challenge-badge { margin-left: auto; }

/* ===== STANDINGS TABLE ===== */
.standings-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.standings-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.72rem;
  min-width: 420px;
  font-family: 'Montserrat', sans-serif;
}
.standings-table th {
  font-family: 'Oswald', sans-serif;
  background: var(--navy);
  color: var(--white);
  padding: 8px 4px;
  text-align: center;
  font-weight: 600;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: sticky;
  top: 0;
  white-space: nowrap;
}
.standings-table th:first-child, .standings-table th:nth-child(2) { text-align: left; }
.standings-table td {
  padding: 7px 4px;
  text-align: center;
  border-bottom: 1px solid var(--gray);
  white-space: nowrap;
}
.standings-table tbody tr:nth-child(even) { background: var(--off-white); }
.standings-table tbody tr:nth-child(odd) { background: var(--white); }
.standings-table td:first-child { text-align: center; font-weight: 600; width: 28px; }
.standings-table td:nth-child(2) { text-align: left; }
.standings-table tr.qualified { background: var(--red-dim) !important; }
.standings-table .team-cell { display: flex; align-items: center; gap: 4px; }
.standings-table .team-cell .flag { font-size: 1rem; }
.standings-table .pts { font-weight: 700; color: var(--red); }

/* Small group standings */
.group-standings { margin-top: 10px; }
.group-standings .standings-table { min-width: 100%; }
.group-standings .standings-table th, .group-standings .standings-table td { padding: 5px 3px; font-size: 0.68rem; }

/* ===== SCHEDULE ===== */
.week-section { margin-bottom: 16px; }
.week-header {
  font-family: 'Oswald', sans-serif;
  background: var(--navy);
  color: var(--white);
  padding: 10px 14px;
  border-radius: var(--radius) var(--radius) 0 0;
  font-size: 0.82rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.week-header.current { background: var(--red); border-left: none; }
.week-header .week-date { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: rgba(255,255,255,0.8); font-weight: 500; text-transform: none; letter-spacing: 0; }
.match-list {
  background: var(--white);
  border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
.match-row {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--gray);
  font-size: 0.8rem;
  transition: background 0.15s ease;
}
.match-row:hover { background: rgba(0,0,0,0.015); }
.match-row:last-child { border-bottom: none; }
.match-team {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}
.match-team.away { justify-content: flex-end; text-align: right; flex-direction: row-reverse; }
.match-team .flag { font-size: 1.2rem; }
.match-team .name { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.78rem; }
.match-vs {
  padding: 0 8px;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.75rem;
  color: var(--red);
  font-weight: 500;
  flex-shrink: 0;
}
.match-score {
  font-family: 'Oswald', sans-serif;
  background: var(--navy);
  color: var(--white);
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 1.1rem;
  flex-shrink: 0;
  min-width: 50px;
  text-align: center;
}
.match-label {
  font-size: 0.65rem;
  color: var(--gray-mid);
  margin-top: 2px;
  text-align: center;
  width: 100%;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.match-row-wrap { border-bottom: 1px solid var(--gray); }
.match-row-wrap:last-child { border-bottom: none; }
.match-row-wrap .match-row { border-bottom: none; }
.challenge-badge {
  display: inline-block;
  background: rgba(0, 102, 143, 0.1);
  color: var(--teal);
  font-size: 0.6rem;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 4px;
}

/* ===== BRACKET ===== */
.bracket-container { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 16px; }
.bracket {
  display: flex;
  gap: 12px;
  min-width: 700px;
  align-items: flex-start;
  padding: 8px 0;
}
.bracket-round {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 150px;
}
.bracket-round-title {
  font-family: 'Oswald', sans-serif;
  text-align: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--red);
  margin-bottom: 4px;
}
.bracket-match {
  background: var(--navy-deep);
  border-radius: 6px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
.bracket-team {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 8px;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--white);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.bracket-team:last-child { border-bottom: none; }
.bracket-team.winner { border-left: 3px solid var(--red); font-weight: 700; }
.bracket-team.tbd { color: rgba(255,255,255,0.4); font-style: italic; border: 1px dashed rgba(255,255,255,0.15); border-radius: 6px; }
.bracket-team .flag { font-size: 0.9rem; }
.bracket-team .score { margin-left: auto; font-weight: 700; font-size: 0.72rem; color: var(--red-light); }
.bracket-spacer { height: 20px; }

/* Third place match */
.third-place { margin-top: 20px; }
.third-place .card-title { color: var(--teal); }

/* Consolation section */
.consolation-section { margin-top: 24px; }
.consolation-section .card-title { margin-bottom: 12px; }

/* ===== FILTER PILLS ===== */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.filter-pill {
  background: var(--white);
  border: 1.5px solid var(--gray);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--gray-dark);
}
.filter-pill.active {
  background: var(--navy);
  color: var(--white);
  border-color: var(--navy);
}

/* ===== COACH-SPECIFIC STYLES ===== */
.coach-card {
  border-left: 4px solid var(--red);
}
.coach-card .card-title {
  color: #c41e38;
}

.form-button {
  display: block;
  width: 100%;
  background: var(--red);
  color: var(--white);
  text-align: center;
  padding: 18px 20px;
  border-radius: var(--radius);
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 4px 16px rgba(238, 43, 71, 0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  margin-bottom: 12px;
  animation: slideUp 0.3s ease both;
}
.form-button:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 20px rgba(238, 43, 71, 0.4);
}
.form-button:active {
  transform: scale(0.98);
  box-shadow: 0 2px 8px rgba(238, 43, 71, 0.3);
}

.deadline-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(238, 43, 71, 0.08);
  border: 1px solid rgba(238, 43, 71, 0.25);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 12px;
  font-size: 0.8rem;
  font-weight: 600;
  color: #c41e38;
  animation: slideUp 0.35s ease both;
}
.deadline-bar .icon { font-size: 1.1rem; }

.coach-highlight {
  background: rgba(238, 43, 71, 0.06);
  border: 1px solid rgba(238, 43, 71, 0.2);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 12px;
}
.coach-highlight p {
  font-size: 0.82rem;
  line-height: 1.5;
  color: var(--gray-dark);
}

.scoring-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  text-align: center;
  margin: 12px 0;
}
.scoring-item {
  background: var(--off-white);
  border-radius: 8px;
  padding: 12px 8px;
}
.scoring-item .points {
  font-family: 'Oswald', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--red);
}
.scoring-item .result-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--gray-mid);
  text-transform: uppercase;
  margin-top: 2px;
}

.admin-notes {
  background: var(--off-white);
  border: 1px dashed var(--gray);
  border-radius: 8px;
  padding: 14px;
  margin-top: 8px;
}
.admin-notes .admin-title {
  font-family: 'Oswald', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gray-mid);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.admin-notes ul {
  list-style: none;
  padding: 0;
}
.admin-notes li {
  font-size: 0.78rem;
  color: var(--gray-dark);
  padding: 3px 0;
  line-height: 1.4;
}
.admin-notes li::before {
  content: "\2022 ";
  color: var(--red);
  font-weight: 700;
}

/* ===== FOOTER ===== */
.footer {
  background: var(--navy-deep);
  text-align: center;
  padding: 24px 16px;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.65rem;
  color: rgba(255,255,255,0.5);
}

/* ===== RESPONSIVE ===== */
@media (min-width: 600px) {
  .tab-content { padding: 20px; }
  .tab-nav button { font-size: 0.76rem; padding: 12px 8px 10px; }
  .header h1 { font-size: 2.4rem; }
  .header-logo { height: 225px; }
  .club-name { font-size: 1.8rem; }
  .groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .groups-grid .card { margin-bottom: 0; }
  .bracket { flex-direction: row; }
}

/* ===== UTILITY ===== */
.text-center { text-align: center; }
.text-gold { color: var(--red); }
a { color: var(--teal); }
.mb-8 { margin-bottom: 8px; }
.mt-12 { margin-top: 12px; }
</style>

<!-- Header -->
<header class="header">
  <img src="https://cdn2.sportngin.com/attachments/photo/bd06-216817597/BSC_TT_-_NBG_large.png" alt="Brookline Soccer Club" class="header-logo">
  <div class="club-name">Brookline Soccer Club</div>
  <h1>World Cup 2026</h1>
  <div class="week-badge" id="weekBadge">Week 1 - Group Stage</div>
</header>

<!-- Coach Banner -->
<div class="coach-banner">Coach View</div>

<!-- Tab Navigation -->
<nav class="tab-nav">
  <button class="active" data-tab="coach" onclick="switchTab('coach')">Coach</button>
  <button data-tab="home" onclick="switchTab('home')">Home</button>
  <button data-tab="groups" onclick="switchTab('groups')">Groups</button>
  <button data-tab="standings" onclick="switchTab('standings')">Standings</button>
  <button data-tab="schedule" onclick="switchTab('schedule')">Schedule</button>
  <button data-tab="bracket" onclick="switchTab('bracket')">Bracket</button>
</nav>

<!-- Coach Tab -->
<div id="tab-coach" class="tab-content active"></div>

<!-- Home Tab -->
<div id="tab-home" class="tab-content"></div>

<!-- Groups Tab -->
<div id="tab-groups" class="tab-content"></div>

<!-- Standings Tab -->
<div id="tab-standings" class="tab-content"></div>

<!-- Schedule Tab -->
<div id="tab-schedule" class="tab-content"></div>

<!-- Bracket Tab -->
<div id="tab-bracket" class="tab-content"></div>

<!-- Footer -->
<div class="footer">BSC World Cup 2026 &middot; Brookline Soccer Club &middot; Coach Edition</div>

<script>
// =============================================================================
// ===== WEEKLY UPDATE SECTION =================================================
// =============================================================================
// Update currentWeek each Monday (1-7). Update RESULTS and BRACKET as season
// progresses. Update ANNOUNCEMENTS with current news.
// =============================================================================

const CURRENT_WEEK = 1; // 1=Apr 20, 2=Apr 27, 3=May 4, 4=May 11, 5=May 18, 6=May 25, 7=Jun 1

const WEEK_DATES = {
  1: "April 20",
  2: "April 27",
  3: "May 4",
  4: "May 11",
  5: "May 18",
  6: "May 25",
  7: "June 1"
};

const WEEK_LABELS = {
  1: "Group Stage - Matchday 1",
  2: "Group Stage - Matchday 2",
  3: "Group Stage - Matchday 3",
  4: "Round of 16",
  5: "Quarterfinals",
  6: "Semifinals",
  7: "Final & Third Place"
};

// ===== ANNOUNCEMENTS =====
// Add/remove announcements each week. Most recent first.
const ANNOUNCEMENTS = [
  {
    date: "April 14, 2026",
    text: "Welcome to the BSC World Cup 2026! Opening ceremonies and Matchday 1 kick off on April 20. Check the Groups and Schedule tabs to see your team's draw. Good luck to all 33 teams!"
  },
  {
    date: "April 10, 2026",
    text: "The group draw is complete! 33 BSC teams have been assigned to 12 groups. Check out which World Cup country your team represents."
  }

// ===== HELPER FUNCTIONS =====
function getTeam(id) {
  return TEAMS.find(t => t.id === id);
}

function getChallengeOpponent(ref) {
  const parts = ref.split(":");
  const group = parts[1];
  const idx = parseInt(parts[2]);
  return (CHALLENGE_COUNTRIES[group] && CHALLENGE_COUNTRIES[group][idx]) || { country: "TBD", flag: "\u2753" };
}

function getMatchResult(week, matchIndex) {
  const key = week + "-" + matchIndex;
  return RESULTS[key] || null;
}

// ===== STANDINGS CALCULATION =====
function calcStandings(teamIds, weekFilter) {
  const stats = {};
  teamIds.forEach(id => {
    stats[id] = { mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
  });

  // Iterate through group-stage weeks (1-3)
  const weeks = weekFilter || [1, 2, 3];
  weeks.forEach(week => {
    const matches = SCHEDULE[week] || [];
    matches.forEach((match, idx) => {
      if (match.type !== "group") return;
      const result = getMatchResult(week, idx);
      if (!result) return;
      const hId = match.home;
      const aId = match.away;
      if (!stats[hId] || !stats[aId]) return;

      stats[hId].mp++;
      stats[aId].mp++;
      stats[hId].gf += result.homeScore;
      stats[hId].ga += result.awayScore;
      stats[aId].gf += result.awayScore;
      stats[aId].ga += result.homeScore;

      if (result.homeScore > result.awayScore) {
        stats[hId].w++; stats[hId].pts += 3;
        stats[aId].l++;
      } else if (result.homeScore < result.awayScore) {
        stats[aId].w++; stats[aId].pts += 3;
        stats[hId].l++;
      } else {
        stats[hId].d++; stats[hId].pts += 1;
        stats[aId].d++; stats[aId].pts += 1;
      }
    });
  });

  // Calculate GD
  teamIds.forEach(id => {
    stats[id].gd = stats[id].gf - stats[id].ga;
  });

  // Sort: pts desc, gd desc, gf desc
  const sorted = [...teamIds].sort((a, b) => {
    if (stats[b].pts !== stats[a].pts) return stats[b].pts - stats[a].pts;
    if (stats[b].gd !== stats[a].gd) return stats[b].gd - stats[a].gd;
    if (stats[b].gf !== stats[a].gf) return stats[b].gf - stats[a].gf;
    return 0;
  });

  return sorted.map(id => ({ teamId: id, ...stats[id] }));
}

function calcOverallStandings() {
  const allIds = TEAMS.map(t => t.id);
  return calcStandings(allIds);
}

function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab-' + tabName).classList.add('active');
  document.querySelectorAll('.tab-nav button').forEach(btn => {
    if (btn.getAttribute('data-tab') === tabName) btn.classList.add('active');
  });
  // Re-render dynamic content
  if (tabName === 'coach') renderCoach();
  if (tabName === 'home') renderHome();
  if (tabName === 'groups') renderGroups();
  if (tabName === 'standings') renderStandings();
  if (tabName === 'schedule') renderSchedule();
  if (tabName === 'bracket') renderBracket();
}

      }
      const result = getMatchResult(CURRENT_WEEK, idx);
      html += '<div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--gray);font-size:0.8rem;">';
      html += '<span style="margin-right:6px;">' + (homeTeam ? homeTeam.flag : '') + '</span>';
      html += '<span style="font-weight:600;flex:1;">' + (homeTeam ? homeTeam.country : 'TBD') + '</span>';
      if (result) {
        html += '<span style="background:var(--navy);color:var(--white);padding:2px 8px;border-radius:4px;font-weight:700;font-size:0.75rem;">' + result.homeScore + ' - ' + result.awayScore + '</span>';
      } else {
        html += '<span style="color:var(--gray-mid);font-size:0.7rem;font-weight:600;">vs</span>';
      }
      html += '<span style="font-weight:600;flex:1;text-align:right;">' + awayName + '</span>';
      html += '<span style="margin-left:6px;">' + awayFlag + '</span>';
      if (isChallenge) html += '<span class="challenge-badge" style="margin-left:4px;">CH</span>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Admin Notes section
  html += '<div class="admin-notes">';
  html += '<div class="admin-title">Admin Notes</div>';
  html += '<ul>';
  html += '<li>Organizer contact: [ ORGANIZER: Add your name, phone, and email here ]</li>';
  html += '<li>Backup contact: [ ORGANIZER: Add backup contact info here ]</li>';
  html += '<li>Google Form results are reviewed before being entered into the app</li>';
  html += '<li>If you have scoring disputes, contact the organizer before the Wednesday deadline</li>';
  html += '<li>This coach page is updated weekly &mdash; always use the latest version</li>';
  html += '<li>Do not share this link publicly; it is for coaches only</li>';
  html += '</ul>';
  html += '</div>';

  el.innerHTML = html;
}
// =============================================================================
// ===== END COACH-ONLY SECTION ================================================
// =============================================================================

// ===== RENDER: HOME =====
function renderHome() {
  const el = document.getElementById('tab-home');
  let html = '';

  // Countdown / Status
  const weekDates = {
    1: new Date(2026, 3, 20), 2: new Date(2026, 3, 27), 3: new Date(2026, 4, 4),
    4: new Date(2026, 4, 11), 5: new Date(2026, 4, 18), 6: new Date(2026, 4, 25),
    7: new Date(2026, 5, 1)
  };
  const now = new Date();
  const nextDate = weekDates[CURRENT_WEEK];
  const diff = nextDate ? Math.ceil((nextDate - now) / (1000 * 60 * 60 * 24)) : 0;

  if (CURRENT_WEEK <= 7 && diff > 0) {
    html += '<div class="card countdown-card">';
    html += '<div class="label">Next Match Day</div>';
    html += '<div class="value">' + diff + ' day' + (diff !== 1 ? 's' : '') + '</div>';
    html += '<div class="sub">' + WEEK_LABELS[CURRENT_WEEK] + ' \u2014 ' + WEEK_DATES[CURRENT_WEEK] + '</div>';
    html += '</div>';
  } else if (CURRENT_WEEK <= 7) {
    html += '<div class="card countdown-card">';
    html += '<div class="label">Today</div>';
    html += '<div class="value">' + WEEK_LABELS[CURRENT_WEEK] + '</div>';
    html += '<div class="sub">' + WEEK_DATES[CURRENT_WEEK] + '</div>';
    html += '</div>';
  } else {
    html += '<div class="card countdown-card">';
    html += '<div class="label">Tournament Complete</div>';
    html += '<div class="value">\ud83c\udfc6</div>';
    html += '<div class="sub">Thanks for a great season!</div>';
    html += '</div>';
  }

  // Current week info
  html += '<div class="card">';
  html += '<div class="card-title">Week ' + CURRENT_WEEK + ' \u2014 ' + (WEEK_LABELS[CURRENT_WEEK] || '') + '</div>';
  html += '<p style="font-size:0.82rem;line-height:1.5;color:var(--gray-mid);">';
  if (CURRENT_WEEK <= 3) {
    html += 'Group stage matches are underway. Check the Schedule tab for this week\'s matchups and the Groups tab for current standings.';
  } else if (CURRENT_WEEK === 4) {
    html += 'The knockout rounds begin! The top 16 teams compete in the Round of 16. Check the Bracket tab to see the matchups.';
  } else if (CURRENT_WEEK <= 6) {
    html += 'Knockout rounds continue. Every match is win-or-go-home. Check the Bracket tab for the latest results.';
  } else {
    html += 'Championship week! The Final and Third Place match will crown our BSC World Cup champion.';
  }
  html += '</p></div>';

  // Announcements
  ANNOUNCEMENTS.forEach(a => {
    html += '<div class="card announcement">';
    html += '<div class="date">' + a.date + '</div>';
    html += '<p>' + a.text + '</p>';
    html += '</div>';
  });

  // Quick look: how many teams
  html += '<div class="card">';
  html += '<div class="card-title">Tournament at a Glance</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.82rem;">';
  html += '<div><strong>33</strong> Teams</div>';
  html += '<div><strong>12</strong> Groups</div>';
  html += '<div><strong>7</strong> Weeks</div>';
  html += '<div><strong>16</strong> Knockout Spots</div>';
  html += '</div></div>';

  el.innerHTML = html;
}

// ===== RENDER: GROUPS =====
function getGroupChallengeCountries(groupLetter) {
  return CHALLENGE_COUNTRIES[groupLetter] || [];
}

function renderGroups() {
  const el = document.getElementById('tab-groups');
  let html = '<div class="groups-grid">';

  Object.keys(GROUPS).forEach(letter => {
    const teamIds = GROUPS[letter];
    const standings = calcStandings(teamIds);
    const hasResults = standings.some(s => s.mp > 0);
    const challengeTeams = getGroupChallengeCountries(letter);

    html += '<div class="card group-card">';
    html += '<div class="group-header">Group ' + letter + '</div>';

    if (!hasResults) {
      // Show BSC team list
      teamIds.forEach(id => {
        const t = getTeam(id);
        html += '<div class="group-team">';
        html += '<span class="flag">' + t.flag + '</span>';
        html += '<span class="country">' + t.country + '</span>';
        html += '<span class="bsc-name">' + t.bscName + '</span>';
        html += '</div>';
      });
      // Show challenge opponents (same layout, "Challenge" where BSC name would go)
      challengeTeams.forEach(c => {
        html += '<div class="group-team group-team-challenge">';
        html += '<span class="flag">' + c.flag + '</span>';
        html += '<span class="country">' + c.country + '</span>';
        html += '<span class="bsc-name challenge-badge">Challenge</span>';
        html += '</div>';
      });
    } else {
      // Show standings table
      html += '<div class="group-standings"><div class="standings-table-wrap">';
      html += '<table class="standings-table">';
      html += '<thead><tr><th>#</th><th>Team</th><th>MP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>';
      html += '<tbody>';
      standings.forEach((s, i) => {
        const t = getTeam(s.teamId);
        html += '<tr>';
        html += '<td>' + (i + 1) + '</td>';
        html += '<td><div class="team-cell"><span class="flag">' + t.flag + '</span> ' + t.country + '</div></td>';
        html += '<td>' + s.mp + '</td><td>' + s.w + '</td><td>' + s.d + '</td><td>' + s.l + '</td>';
        html += '<td>' + s.gf + '</td><td>' + s.ga + '</td><td>' + (s.gd >= 0 ? '+' : '') + s.gd + '</td>';
        html += '<td class="pts">' + s.pts + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div></div>';
    }

    html += '</div>';
  });

  html += '</div>';
  el.innerHTML = html;
}

// ===== RENDER: STANDINGS =====
function renderStandings() {
  const el = document.getElementById('tab-standings');
  const standings = calcOverallStandings();
  const hasResults = standings.some(s => s.mp > 0);

  let html = '';
  html += '<div class="card">';
  html += '<div class="card-title">Overall Standings</div>';

  if (!hasResults) {
    html += '<p style="font-size:0.82rem;color:var(--gray-mid);text-align:center;padding:20px 0;">Standings will appear after Week 1 results are entered.</p>';
  } else {
    html += '<div class="standings-table-wrap">';
    html += '<table class="standings-table">';
    html += '<thead><tr><th>#</th><th>Team</th><th>Grp</th><th>MP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>';
    html += '<tbody>';
    standings.forEach((s, i) => {
      const t = getTeam(s.teamId);
      const qualified = i < 16;
      html += '<tr class="' + (qualified ? 'qualified' : '') + '">';
      html += '<td>' + (i + 1) + '</td>';
      html += '<td><div class="team-cell"><span class="flag">' + t.flag + '</span> ' + t.country + '</div></td>';
      html += '<td>' + t.group + '</td>';
      html += '<td>' + s.mp + '</td><td>' + s.w + '</td><td>' + s.d + '</td><td>' + s.l + '</td>';
      html += '<td>' + s.gf + '</td><td>' + s.ga + '</td><td>' + (s.gd >= 0 ? '+' : '') + s.gd + '</td>';
      html += '<td class="pts">' + s.pts + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    html += '<div style="margin-top:8px;font-size:0.7rem;color:var(--gray-mid);display:flex;align-items:center;gap:6px;">';
    html += '<span style="display:inline-block;width:12px;height:12px;background:var(--qualified-bg);border:1px solid #ed1c24;border-radius:2px;"></span>';
    html += 'Top 16 qualify for Knockout Round';
    html += '</div>';
  }

  html += '</div>';

  // If no results, show all teams grouped by grade
  if (!hasResults) {
    html += '<div class="card">';
    html += '<div class="card-title">All 33 Teams</div>';
    const grades = ["3rd", "4th", "5th", "6th", "7th", "8th"];
    grades.forEach(grade => {
      const gradeTeams = TEAMS.filter(t => t.grade === grade);
      html += '<div style="margin-bottom:12px;">';
      html += '<div style="font-size:0.75rem;font-weight:700;color:var(--navy);margin-bottom:4px;">' + grade + ' Grade</div>';
      gradeTeams.forEach(t => {
        html += '<div class="group-team">';
        html += '<span class="flag">' + t.flag + '</span>';
        html += '<span class="country">' + t.country + '</span>';
        html += '<span class="bsc-name">' + t.bscName + ' \u2014 Group ' + t.group + '</span>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

// ===== RENDER: SCHEDULE =====
function renderSchedule() {
  const el = document.getElementById('tab-schedule');
  let html = '';

  for (let week = 1; week <= 7; week++) {
    const matches = SCHEDULE[week] || [];
    const isCurrent = week === CURRENT_WEEK;
    const weekLabel = WEEK_LABELS[week] || 'Week ' + week;

    html += '<div class="week-section">';
    html += '<div class="week-header ' + (isCurrent ? 'current' : '') + '">';
    html += '<span>Week ' + week + ' \u2014 ' + weekLabel + '</span>';
    html += '<span class="week-date">' + (WEEK_DATES[week] || '') + '</span>';
    html += '</div>';

    if (matches.length === 0) {
      html += '<div class="match-list"><div class="match-row" style="justify-content:center;color:var(--gray-mid);font-size:0.8rem;padding:16px;">Matchups TBD</div></div>';
    } else {
      html += '<div class="match-list">';
      matches.forEach((match, idx) => {
        const result = getMatchResult(week, idx);
        const homeTeam = getTeam(match.home);
        let awayTeam, awayFlag, awayName, isChallenge = false;

        if (typeof match.away === 'string' && match.away.startsWith('challenge:')) {
          const opp = getChallengeOpponent(match.away);
          awayFlag = opp.flag;
          awayName = opp.country;
          isChallenge = true;
        } else {
          awayTeam = getTeam(match.away);
          awayFlag = awayTeam ? awayTeam.flag : '';
          awayName = awayTeam ? awayTeam.country : 'TBD';
        }

        html += '<div class="match-row-wrap">';
        html += '<div class="match-row">';
        html += '<div class="match-team home">';
        html += '<span class="flag">' + (homeTeam ? homeTeam.flag : '') + '</span>';
        html += '<span class="name">' + (homeTeam ? homeTeam.country : 'TBD') + '</span>';
        html += '</div>';

        if (result) {
          html += '<div class="match-score">' + result.homeScore + ' \u2013 ' + result.awayScore + '</div>';
        } else {
          html += '<div class="match-vs">vs</div>';
        }

        html += '<div class="match-team away">';
        html += '<span class="flag">' + awayFlag + '</span>';
        html += '<span class="name">' + awayName + '</span>';
        if (isChallenge) html += '<span class="challenge-badge">Challenge</span>';
        html += '</div>';
        html += '</div>';

        // Match label
        if (match.group) {
          html += '<div class="match-label">Group ' + match.group + (match.type === 'challenge' ? ' \u2014 Challenge Match' : '') + '</div>';
        } else if (match.label) {
          html += '<div class="match-label">' + match.label + '</div>';
        }

        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  }

  el.innerHTML = html;
}

// ===== RENDER: BRACKET =====
function renderBracket() {
  const el = document.getElementById('tab-bracket');
  let html = '';

  html += '<div class="card">';
  html += '<div class="card-title">Knockout Bracket</div>';

  if (CURRENT_WEEK < 4) {
    html += '<p style="font-size:0.82rem;color:var(--gray-mid);text-align:center;padding:12px 0;">The knockout bracket will be determined after the group stage concludes (Week 3). Top 16 teams advance.</p>';
  }

  html += '<div class="bracket-container"><div class="bracket">';

  // Round of 16
  html += renderBracketRound('Round of 16', BRACKET.r16);

  // Quarterfinals
  html += renderBracketRound('Quarterfinals', BRACKET.qf);

  // Semifinals
  html += renderBracketRound('Semifinals', BRACKET.sf);

  // Final
  html += renderBracketRound('Final', [BRACKET.final]);

  html += '</div></div></div>';

  // Third place match
  html += '<div class="card third-place">';
  html += '<div class="card-title">Third Place Match</div>';
  html += renderBracketMatchCard(BRACKET.third);
  html += '</div>';

  // Consolation standings
  html += '<div class="consolation-section">';
  html += '<div class="card">';
  html += '<div class="card-title">Consolation Standings</div>';

  if (CURRENT_WEEK < 4) {
    html += '<p style="font-size:0.82rem;color:var(--gray-mid);text-align:center;padding:12px 0;">Teams finishing outside the top 16 will play consolation matches in Weeks 4\u20137. Standings will appear here.</p>';
  } else {
    // Show consolation standings once we have them
    html += '<p style="font-size:0.82rem;color:var(--gray-mid);text-align:center;padding:12px 0;">Consolation standings will update as matches are played.</p>';
  }

  html += '</div></div>';

  el.innerHTML = html;
}

function renderBracketRound(title, matches) {
  let html = '<div class="bracket-round">';
  html += '<div class="bracket-round-title">' + title + '</div>';

  matches.forEach((m, i) => {
    html += renderBracketMatchCard(m);
    // Add spacers for alignment in earlier rounds
    if (title === 'Round of 16' && i < matches.length - 1 && i % 2 === 1) {
      // no spacer needed between pairs
    }
  });

  html += '</div>';
  return html;
}

function renderBracketMatchCard(m) {
  let html = '<div class="bracket-match">';

  const homeTeam = m.home.teamId ? getTeam(m.home.teamId) : null;
  const awayTeam = m.away.teamId ? getTeam(m.away.teamId) : null;

  const homeWinner = m.home.score !== null && m.away.score !== null && m.home.score > m.away.score;
  const awayWinner = m.home.score !== null && m.away.score !== null && m.away.score > m.home.score;

  html += '<div class="bracket-team ' + (homeWinner ? 'winner' : '') + (homeTeam ? '' : ' tbd') + '">';
  html += '<span class="flag">' + (homeTeam ? homeTeam.flag : '') + '</span> ';
  html += (homeTeam ? homeTeam.country : (m.label ? m.label.split(' vs ')[0] || 'TBD' : 'TBD'));
  if (m.home.score !== null) html += '<span class="score">' + m.home.score + '</span>';
  html += '</div>';

  html += '<div class="bracket-team ' + (awayWinner ? 'winner' : '') + (awayTeam ? '' : ' tbd') + '">';
  html += '<span class="flag">' + (awayTeam ? awayTeam.flag : '') + '</span> ';
  html += (awayTeam ? awayTeam.country : (m.label ? m.label.split(' vs ')[1] || 'TBD' : 'TBD'));
  if (m.away.score !== null) html += '<span class="score">' + m.away.score + '</span>';
  html += '</div>';

  html += '</div>';
  return html;
}

// ===== WEEK BADGE =====
function updateWeekBadge() {
  const badge = document.getElementById('weekBadge');
  if (CURRENT_WEEK <= 3) {
    badge.textContent = 'Week ' + CURRENT_WEEK + ' \u2014 Group Stage';
  } else if (CURRENT_WEEK === 4) {
    badge.textContent = 'Week 4 \u2014 Round of 16';
  } else if (CURRENT_WEEK === 5) {
    badge.textContent = 'Week 5 \u2014 Quarterfinals';
  } else if (CURRENT_WEEK === 6) {
    badge.textContent = 'Week 6 \u2014 Semifinals';
  } else {
    badge.textContent = 'Week 7 \u2014 Finals';
  }
}

// ===== INIT =====
function init() {
  updateWeekBadge();
  renderCoach();
}

init();
</script>
